spring.application.name=location-service

server.port=8090

# Connect to Redis running in your Docker container
spring.data.redis.host=fvn-redis
spring.data.redis.port=6379
spring.kafka.bootstrap-servers=fvn-kafka:9092
# --- KAFKA CONFIGURATION ---
# Use localhost since you are running this standalone outside of Docker right now

spring.kafka.consumer.group-id=location-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# THE FIX: Tell Kafka to ignore the original package name and force it into our local Record
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.IDP.location_service.model.JourneyEvent

logging.level.org.springframework.kafka=DEBUG
logging.level.org.apache.kafka=INFO

# Tell Kafka to use Spring's JSON Deserializer for the values
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Tell the Deserializer it is allowed to convert JSON into your JourneyEvent class
spring.kafka.consumer.properties.spring.json.trusted.packages=*